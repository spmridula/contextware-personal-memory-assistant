<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#4a90d9" />
    <meta name="description" content="Context-Ware Personal Memory Assistant - Local face recognition that respects your privacy" />
    
    <!-- Permissions Policy for Camera -->
    <meta http-equiv="Permissions-Policy" content="camera=self" />
    
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    
    <title>Context-Ware Personal Memory Assistant</title>
    
    <style>
      /* Critical CSS for initial load */
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: #f5f7fa;
      }
      
      #root {
        min-height: 100vh;
      }
      
      .initial-loader {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        color: #4a90d9;
      }
      
      .initial-loader h1 {
        margin-bottom: 1rem;
      }
      
      .initial-spinner {
        width: 40px;
        height: 40px;
        border: 4px solid #e0e0e0;
        border-top-color: #4a90d9;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this application.</noscript>
    <div id="root">
      <!-- Initial loading state before React mounts -->
      <div class="initial-loader">
        <h1>Context-Ware Personal Memory Assistant</h1>
        <div class="initial-spinner"></div>
        <p>Loading application...</p>
      </div>
    </div>
  </body>
</html>
